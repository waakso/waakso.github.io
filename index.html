<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>이미지 뷰어</title>

<style>
body{
    margin:0;
}

.bottom-bar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:40px;

    background:#000;

    z-index:1000;
}

.toolbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    display:flex;
    z-index:1000;
    background:#000;
}

.toolbar button{
    flex:1;
    padding:15px;
    border:none;
    cursor:pointer;

    background:#000;
    color:#fff;
}

.content{
    display:none;
    margin-top:50px;
}

.content.active{
    display:block;
}

.content img{
    display:block;
    width:100%;
    height:auto;
}
</style>
</head>

<body>

<div class="toolbar">
    <button onclick="showTab(0)">한글</button>
    <button onclick="showTab(1)">영어</button>
    <button onclick="showTab(2)">글자포스터</button>
    <button onclick="showTab(3)">날것</button>
</div>

<div class="content active">
    <img src="Frame_2.png">
</div>

<div class="content">
    <img src="Frame_1.png">
</div>

<div class="content">
    <img src="sitka.png">
    <img src="noto.png">
</div>

<div class="content">
    <img src="frame4_top.png">
    <img src="frame4_bottom.png">
</div>

<script>
function showTab(index){
    document.querySelectorAll('.content')
        .forEach(c => c.classList.remove('active'));

    document.querySelectorAll('.content')[index]
        .classList.add('active');

    window.scrollTo({
        top: 0,
        behavior: 'smooth'
    });
}
</script>

<div class="bottom-bar"></div>

</body>
</html>
