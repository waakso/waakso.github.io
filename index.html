<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>이미지 뷰어</title>

<style>
body{
    margin:0;
}

.toolbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    display:flex;
    z-index:1000;
}

.toolbar button{
    flex:1;
    padding:15px;
    border:none;
    cursor:pointer;
}

.content{
    display:none;
    margin-top:50px;
}

.content.active{
    display:block;
}

.content img{
    display:block;
    width:100%;
    height:auto;
}
</style>
</head>

<body>

<div class="toolbar">
    <button onclick="showTab(0)">한글</button>
    <button onclick="showTab(1)">영어</button>
    <button onclick="showTab(2)">글자</button>
    <button onclick="showTab(3)">실사</button>
</div>

<div class="content active">
    <img src="Frame 2.png">
</div>

<div class="content">
    <img src="Frame_1.png">
</div>

<div class="content">
    <img src="항목3.png">
</div>

<div class="content">
    <img src="항목4.png">
</div>

<script>
function showTab(index){
    document.querySelectorAll('.content')
        .forEach(c => c.classList.remove('active'));

    document.querySelectorAll('.content')[index]
        .classList.add('active');

    window.scrollTo({
        top: 0,
        behavior: 'smooth'
    });
}
</script>

</body>
</html>
